<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <h1>My Image Gallery</h1>
        <div class="gallery-grid">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="gallery-item" alt="Nature 1">
    <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05" class="gallery-item" alt="Nature 2">
    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" class="gallery-item" alt="Nature 3">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" class="gallery-item" alt="Nature 4">
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <button class="prev">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img">
        <button class="next">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
